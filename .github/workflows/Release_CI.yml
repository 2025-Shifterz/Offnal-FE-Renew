name: Release CI (Internal Test/Staging/Production)

on:
  push:
    branches: ['release/*', 'main', 'chore/OFFNAL-22']
    tags: ['v*']

jobs:
  build_android_release:
    name: Build Android (Release)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Set up JDK Version 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Create gradle.properties from Base64
        run: |
          echo "${{ secrets.GRADLE_PROPERTIES_BASE_64 }}" | base64 --decode > android/gradle.properties

      - name: Create .env.development from Base64
        run: |
          mkdir -p env
          echo "${{ secrets.ENV_PROD_BASE_64 }}" | base64 --decode > env/.env.production

      - name: Build Offnal Android (Release)
        run: cd android && ./gradlew assembleProductRelease

  build_ios_release:
    name: Build iOS (Release)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Set up Ruby (with cache)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4.4'
          bundler-cache: true

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('**/Podfile.lock', 'package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Create .env.development from Base64
        run: |
          mkdir -p env
          echo "${{ secrets.ENV_PROD_BASE_64 }}" | base64 --decode > env/.env.production
          cp env/.env.production .env

      - name: Install iOS dependencies (with CocoaPods)
        run: cd ios && bundle exec pod install

      - name: Build Offnal iOS (Production Release)
        run: |
          cd ios
          xcodebuild -workspace Offnal.xcworkspace \
                     -scheme Production \
                     -sdk iphonesimulator \
                     -configuration Release \
                     clean build
